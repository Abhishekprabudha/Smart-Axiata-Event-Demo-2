name: Render recorded webpage MP4

on:
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: 'Optional recording length in seconds; leave blank for the full storyboard'
        required: false
        type: string
      skip_narration_generate:
        description: 'Use the committed MP3 instead of regenerating narration'
        required: false
        type: boolean
        default: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core xvfb

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chrome
        run: python -m playwright install chrome

      - name: Record live webpage to MP4
        run: |
          args=()
          if [ -n "${{ inputs.duration_seconds }}" ]; then
            args+=(--duration "${{ inputs.duration_seconds }}")
          fi
          if [ "${{ inputs.skip_narration_generate }}" = "true" ]; then
            args+=(--skip-narration-generate)
          fi
          python3 scripts/render_mp4.py "${args[@]}"

      - name: Verify MP4 artifact exists
        run: test -f dist/airport-agent-demo-webpage-recording.mp4

      - name: Upload recorded webpage MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: airport-agent-demo-webpage-recording-mp4
          path: |
            dist/airport-agent-demo-webpage-recording.mp4
            dist/airport-agent-demo-narrated.mp4
